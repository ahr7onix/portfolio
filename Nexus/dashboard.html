<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Nexus | Gestão de Negócios</title>
    
    <link rel="icon" href="./assets/images/logo.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-page">

    <nav class="dashboard-nav">
        <div class="logo">
            <img src="./assets/images/logo.png" alt="Nexus Logo">
            <span>Nexus Dashboard</span>
        </div>
        <div class="user-actions">
            <span class="user-status">Admin</span>
            <button onclick="logout()">Sair da Conta</button>
        </div>
    </nav>

    <div class="dashboard reveal active">
        <header class="dashboard-header">
            <h1>Bem-vindo, Isac. 👋</h1>
            <p class="dashboard-subtitle">Visão geral do seu desempenho hoje.</p>
        </header>

        <div class="analytics-cards">
            <div class="analytics-card">
                <p>Usuários Totais</p>
                <h3 id="users">0</h3>
            </div>

            <div class="analytics-card">
                <p>Receita Estimada</p>
                <h3 id="revenue">0</h3>
            </div>

            <div class="analytics-card">
                <p>Taxa de Conversão</p>
                <h3 id="conversion">0%</h3>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-box">
                <div class="chart-box-header">
                    <h3>Crescimento Trimestral</h3>
                    <select title="Filtrar por período" class="chart-select">
                        <option>Últimos 6 meses</option>
                    </select>
                </div>
                <div class="chart-canvas-wrapper">
                    <canvas id="analyticsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
    <script src="main.js"></script>
</body>
</html>
